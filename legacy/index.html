<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WYND VPN</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .ip-display { font-size: 1.5rem; text-align: center; margin: 20px 0; }
        .ip-value { color: #00d9ff; font-weight: bold; }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .status-connected { background: #00ff88; color: #1a1a2e; }
        .status-disconnected { background: #ff4757; color: #fff; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn {
            flex: 1;
            min-width: 120px;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-sstp { background: #6c5ce7; color: white; }
        .btn-softether { background: #00b894; color: white; }
        .btn-disconnect { background: #ff4757; color: white; }
        .btn:hover { opacity: 0.9; }
        .info { text-align: center; margin-top: 20px; opacity: 0.7; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WYND</h1>
            <p>VPN Control Panel</p>
        </div>
        <div class="status-card">
            <div class="status-badge" id="statusBadge">Checking...</div>
            <div class="ip-display">
                <div>Your IP:</div>
                <div class="ip-value" id="ipValue">Loading...</div>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-sstp" onclick="connectMode('sstp')">SSTP 443</button>
            <button class="btn btn-softether" onclick="connectMode('softether')">SoftEther 53</button>
            <button class="btn btn-disconnect" onclick="disconnectVPN()">Disconnect</button>
        </div>
        <div class="info">
            <p>Server: 161.118.177.7</p>
            <p id="lastUpdate"></p>
        </div>
    </div>
    <script>
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('ipValue').textContent = data.ip;
                const badge = document.getElementById('statusBadge');
                if (data.connected) {
                    badge.textContent = 'CONNECTED';
                    badge.className = 'status-badge status-connected';
                } else {
                    badge.textContent = 'DISCONNECTED';
                    badge.className = 'status-badge status-disconnected';
                }
                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            } catch(e) {
                document.getElementById('ipValue').textContent = 'Error';
            }
        }
        async function connectMode(mode) {
            event.target.textContent = 'Connecting...';
            try {
                await fetch('/api/connect/' + mode);
                setTimeout(updateStatus, 2000);
            } catch(e) {}
            if (mode === 'sstp') event.target.textContent = 'SSTP 443';
            else event.target.textContent = 'SoftEther 53';
        }
        async function disconnectVPN() {
            event.target.textContent = 'Disconnecting...';
            try {
                await fetch('/api/disconnect');
                setTimeout(updateStatus, 2000);
            } catch(e) {}
            event.target.textContent = 'Disconnect';
        }
        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
