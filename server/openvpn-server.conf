port 53
proto tcp-server
dev tun
ca /home/ubuntu/openvpn/ca.crt
cert /home/ubuntu/openvpn/server.crt
key /home/ubuntu/openvpn/server.key
dh none
server 10.8.0.0 255.255.255.0

# Speed optimizations
tun-mtu 1500
mssfix 1450
tcp-nodelay
compress lz4-v2
push "compress lz4-v2"
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 1.1.1.1"
push "dhcp-option DNS 8.8.8.8"
keepalive 10 60
inactive 300

# Buffer optimizations for speed
sndbuf 0
rcvbuf 0
txqueuelen 1000

# Performance
fast-io
ncp-ciphers AES-128-GCM:AES-256-GCM
auth SHA256

# Stability
persist-key
persist-tun

verb 3